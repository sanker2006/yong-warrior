<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0c10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>甬士训练 V5 — 作战终端</title>
<link rel="stylesheet" href="v5.css">
<link rel="icon" href="assets/yongshi-logo-transparent.png" type="image/png">
</head>
<body>

<div id="app">

<header class="v5-header" id="v5-header">
  <div class="v5-header__inner">
    <button class="v5-header__back hidden" id="v5-back" onclick="V5.goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h1 class="v5-header__title" id="v5-title">甬士训练</h1>
    <button class="v5-header__action hidden" id="v5-action" onclick="V5.headerAction()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>
</header>

<main class="v5-content">
  <div class="v5-view-container" id="v5-views">

    <!-- LOGIN -->
    <div class="v5-view active" id="view-login">
      <div class="v5-scroll">
        <div class="v5-login">
          <img class="v5-login__logo" src="assets/yongshi-logo-transparent.png" alt="甬士训练">
          <h2 class="v5-login__title">甬士训练</h2>
          <p class="v5-login__subtitle">Tactical Command Terminal</p>
          <form class="v5-login__form" id="login-form" onsubmit="return V5.handleLogin(event)">
            <div class="v5-form-group">
              <label class="v5-label">手机号</label>
              <input class="v5-input" type="tel" id="login-phone" placeholder="请输入手机号" maxlength="11" autocomplete="tel">
            </div>
            <div class="v5-form-group">
              <label class="v5-label">密码</label>
              <input class="v5-input" type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password">
            </div>
            <button class="v5-btn v5-btn--primary v5-btn--block v5-btn--lg" type="submit" id="login-btn">进入系统</button>
            <p style="text-align:center;margin-top:4px">
              <button class="v5-btn v5-btn--ghost v5-btn--sm" type="button" onclick="V5.showRegister()">注册新账号</button>
            </p>
          </form>
        </div>
      </div>
    </div>

    <!-- REGISTER -->
    <div class="v5-view" id="view-register">
      <div class="v5-scroll">
        <div class="v5-login">
          <h2 class="v5-login__title" style="font-size:1.375rem">注册账号</h2>
          <p class="v5-login__subtitle">New Operator Registration</p>
          <form class="v5-login__form" id="register-form" onsubmit="return V5.handleRegister(event)">
            <div class="v5-form-group"><label class="v5-label">姓名</label><input class="v5-input" type="text" id="reg-name" placeholder="真实姓名" autocomplete="name"></div>
            <div class="v5-form-group"><label class="v5-label">手机号</label><input class="v5-input" type="tel" id="reg-phone" placeholder="11位手机号" maxlength="11" autocomplete="tel"></div>
            <div class="v5-form-group"><label class="v5-label">密码</label><input class="v5-input" type="password" id="reg-password" placeholder="至少6位" autocomplete="new-password"></div>
            <button class="v5-btn v5-btn--primary v5-btn--block v5-btn--lg" type="submit">注册并登录</button>
            <p style="text-align:center;margin-top:4px">
              <button class="v5-btn v5-btn--ghost v5-btn--sm" type="button" onclick="V5.showLogin()">返回登录</button>
            </p>
          </form>
        </div>
      </div>
    </div>

    <!-- HOME -->
    <div class="v5-view" id="view-home">
      <div class="v5-scroll">
        <div class="v5-scroll__inner" id="home-content"></div>
      </div>
    </div>

    <!-- COURSE MAP -->
    <div class="v5-view" id="view-course">
      <div class="v5-scroll">
        <div class="v5-scroll__inner" id="course-content"></div>
      </div>
    </div>

    <!-- LESSON DETAIL -->
    <div class="v5-view" id="view-lesson">
      <div class="v5-scroll">
        <div class="v5-scroll__inner" id="lesson-content"></div>
      </div>
    </div>

    <!-- QUIZ LIST -->
    <div class="v5-view" id="view-quiz">
      <div class="v5-scroll">
        <div class="v5-scroll__inner" id="quiz-content"></div>
      </div>
    </div>

    <!-- QUIZ SESSION -->
    <div class="v5-view" id="view-quiz-session">
      <div id="quiz-session-content" style="height:100%;overflow-y:auto"></div>
    </div>

    <!-- QUIZ RESULT -->
    <div class="v5-view" id="view-quiz-result">
      <div class="v5-scroll">
        <div class="v5-scroll__inner" id="quiz-result-content"></div>
      </div>
    </div>

    <!-- ACTIVITIES -->
    <div class="v5-view" id="view-activities">
      <div class="v5-scroll">
        <div class="v5-scroll__inner" id="activities-content"></div>
      </div>
    </div>

    <!-- ACTIVITY DETAIL -->
    <div class="v5-view" id="view-activity-detail">
      <div class="v5-scroll">
        <div class="v5-scroll__inner" id="activity-detail-content"></div>
      </div>
    </div>

    <!-- MY ACTIVITIES -->
    <div class="v5-view" id="view-my-activities">
      <div class="v5-scroll">
        <div class="v5-scroll__inner" id="my-activities-content"></div>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="v5-view" id="view-profile">
      <div class="v5-scroll">
        <div class="v5-scroll__inner" id="profile-content"></div>
      </div>
    </div>

    <!-- RADAR -->
    <div class="v5-view" id="view-radar">
      <div class="v5-scroll">
        <div class="v5-scroll__inner" id="radar-content"></div>
      </div>
    </div>

    <!-- AAR -->
    <div class="v5-view" id="view-aar">
      <div class="v5-scroll">
        <div class="v5-scroll__inner" id="aar-content"></div>
      </div>
    </div>

    <!-- ASSESSMENT -->
    <div class="v5-view" id="view-assessment">
      <div class="v5-scroll">
        <div class="v5-scroll__inner" id="assessment-content"></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="v5-view" id="view-history">
      <div class="v5-scroll">
        <div class="v5-scroll__inner" id="history-content"></div>
      </div>
    </div>

  </div>
</main>

<nav class="v5-tabbar hidden" id="v5-tabbar">
  <div class="v5-tabbar__inner">
    <button class="v5-tabbar__item active" data-tab="home" onclick="V5.switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </button>
    <button class="v5-tabbar__item" data-tab="course" onclick="V5.switchTab('course')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      <span>训练</span>
    </button>
    <button class="v5-tabbar__item" data-tab="quiz" onclick="V5.switchTab('quiz')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>题库</span>
    </button>
    <button class="v5-tabbar__item" data-tab="activities" onclick="V5.switchTab('activities')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>活动</span>
    </button>
    <button class="v5-tabbar__item" data-tab="profile" onclick="V5.switchTab('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>档案</span>
    </button>
  </div>
</nav>

<div class="v5-toast" id="v5-toast"></div>

</div>

<script src="training-data.js"></script>
<script src="course-content-v2.js"></script>
<script src="question-bank-v2.js"></script>
<script src="v5.js"></script>

</body>
</html>
